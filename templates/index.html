{% extends 'components/base_auth.html' %}

{% block title %}Log In/Index{% endblock %}

{% block body %}


<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow-lg">
                <h3 class="text-center mt-5">Welcome!</h3>
                <form class="mx-auto" method="POST" action="/">
                    {% csrf_token %}
                    <div class="d-flex gap-5">
                        <div>
                            <img src="{{ MEDIA_URL }}static_images/login.png"
                                style="width: 350px; height: 350px; object-fit: cover;">
                        </div>
                        <div class="p-5">
                            <label for="username" class="form-label"><i class="bi bi-person"></i> Username</label>
                            <input type="text" name="username" class="form-control" id="username"
                                style="height: 1.5rem;" required>

                            <label for="password" class="form-label mt-2"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" id="password"
                                style="height: 1.5rem;" required>

                            <div class="d-flex gap-2 mt-2">
                                <div>
                                    <input type="checkbox" name="remember_me" id="remember_me" required>
                                    <label for="remember_me" class="form-label">Remember Me</label>
                                </div>
                                <a href="#" class="text-decoration-none">Forgot Password?</a>
                            </div>

                            <button type="submit" class="btn btn-primary mt-2 text-decoration-none">Login</button>

                            <div class="d-flex gap-2 mt-2">
                                <p class="text-muted">Don't have an account?</p>
                                <a href="/user/register/" class="text-decoration-none">Register</a>
                            </div>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>


{% endblock %}
