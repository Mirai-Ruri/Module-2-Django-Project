{% extends 'components/base_auth.html' %}

{% block title %}Register{% endblock %}

{% block body %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow-lg">
                <h3 class="text-center mt-5">Register</h3>
                <form class="mx-auto" method="POST" action="/user/register/" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="d-flex gap-5">
                        <div>
                            <img src="{{ MEDIA_URL }}static_images/register.png"
                                style="width: 350px; height: 350px; object-fit: cover;" class="mt-3">
                        </div>
                        <div class="p-5">
                            <label for="username" class="form-label"><i class="bi bi-person"></i> Username</label>
                            <input type="text" name="username" class="form-control" id="username"
                                style="height: 1.5rem;" required>

                            <label for="email" class="form-label mt-2"><i class="bi bi-envelope"></i> Email</label>
                            <input type="email" name="email" class="form-control" id="email" style="height: 1.5rem;" required>

                            <label for="password" class="form-label mt-2"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" id="password"
                                style="height: 1.5rem;" required>

                            <label for="image" class="form-label mt-2"><i class="bi bi-image"></i> Image</label>
                            <input type="file" name="image" class="form-control" id="image">

                            <div>
                                <input type="checkbox" name="agree" id="agree" required>
                                <label for="agree" class="form-label text-muted mt-2" style="font-size: x-small;">By
                                    signing
                                    up, I agree with the terms and conditions.</label>
                            </div>

                            <button type="submit" class="btn btn-primary mt-2">Register</button>

                            <div class="d-flex gap-2 mt-2">
                                <p class="text-muted">Already have an account?</p>
                                <a href="/" class="text-decoration-none">Login</a>
                            </div>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>

{% endblock %}
