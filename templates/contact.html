{% extends 'components/base.html' %}

{% block title %}Contact Us{% endblock %}

{% block body %}

<div class="container my-5">
    <div class="row justify-content-center mt-5">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow-lg">
                <h3 class="text-center mt-5">Contact Us<i class="bi bi-telephone"></i></h3>
                <div class="d-flex gap-5">
                    <div>
                        <img src="{{ MEDIA_URL }}static_images/contact.png"
                            style="width: 350px; height: 350px; object-fit: cover;" class="mt-3 mb-5">
                    </div>

                    <form method="POST" action="/user/message/">
                        {% csrf_token %}
                        <div class="container mt-5 me-5">

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text" name="username" class="form-control" id="username"
                                    placeholder="Username" required>
                            </div>

                            <div class="input-group mt-5">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email" name="email" class="form-control" id="email" placeholder="Email" required>
                            </div>

                            <div class="input-group mt-5">
                                <span class="input-group-text">
                                    <i class="bi bi-pen"></i>
                                </span>
                                <input type="text" name="message" class="form-control" id="message"
                                    placeholder="message" required>
                            </div>

                            <button type="submit" class="btn btn-primary mt-5">Send <i class="bi bi-send"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
